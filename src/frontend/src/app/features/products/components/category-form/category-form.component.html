<div class="category-form-container">
  <div class="form-header">
    <h2 mat-dialog-title>
      <mat-icon class="header-icon">add</mat-icon>
      Nova Categoria
    </h2>
    <button mat-icon-button (click)="onCancel()" class="close-button">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <mat-dialog-content class="form-content">
    <div class="catalog-info">
      <mat-icon>folder</mat-icon>
      <span>Catálogo: <strong>{{ data.catalogoNome }}</strong></span>
    </div>

    <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()" class="category-form">
      <div class="form-row">
        <!-- Category Name -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nome da Categoria</mat-label>
          <input matInput 
                 formControlName="nome"
                 placeholder="Digite o nome da categoria"
                 maxlength="100">
          <mat-hint align="end">{{ categoryForm.get('nome')?.value?.length || 0 }}/100</mat-hint>
          <mat-error *ngIf="categoryForm.get('nome')?.invalid && categoryForm.get('nome')?.touched">
            {{ getErrorMessage('nome') }}
          </mat-error>
        </mat-form-field>
      </div>

      <div class="form-row">
        <!-- Description -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Descrição</mat-label>
          <textarea matInput 
                    formControlName="descricao"
                    placeholder="Descreva a categoria"
                    rows="3"
                    maxlength="500"></textarea>
          <mat-hint align="end">{{ categoryForm.get('descricao')?.value?.length || 0 }}/500</mat-hint>
          <mat-error *ngIf="categoryForm.get('descricao')?.invalid && categoryForm.get('descricao')?.touched">
            {{ getErrorMessage('descricao') }}
          </mat-error>
        </mat-form-field>
      </div>
    </form>
  </mat-dialog-content>

  <mat-dialog-actions class="form-actions">
    <button mat-button 
            type="button" 
            (click)="onCancel()"
            [disabled]="isSubmitting">
      Cancelar
    </button>
    <button mat-raised-button 
            color="primary" 
            type="submit"
            (click)="onSubmit()"
            [disabled]="categoryForm.invalid || isSubmitting"
            class="submit-button">
      <mat-icon *ngIf="isLoading" class="spinning">refresh</mat-icon>
      <mat-icon *ngIf="!isLoading">add</mat-icon>
      {{ isLoading ? 'Criando...' : 'Criar Categoria' }}
    </button>
  </mat-dialog-actions>
</div>
