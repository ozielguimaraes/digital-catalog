<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
  <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
    <div class="p-6">
      <!-- Header -->
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-semibold text-gray-900 dark:text-white">
          Editar Imagem
        </h2>
        <button
          (click)="onCancel()"
          class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <!-- Image Editor -->
      <div class="space-y-6">
        <!-- Instructions -->
        <div class="text-sm text-gray-600 dark:text-gray-400">
          <p>• Arraste para mover a área de corte</p>
          <p>• Use a roda do mouse ou os botões +/- para ajustar o zoom</p>
          <p>• A área azul mostra o que será cortado</p>
        </div>

        <!-- Canvas Container -->
        <div class="flex justify-center">
          <div class="relative border border-gray-300 rounded-lg overflow-hidden">
            <!-- Loading indicator -->
            <div *ngIf="!imageLoaded" class="flex items-center justify-center h-64 w-96 bg-gray-100 dark:bg-gray-700">
              <div class="text-center">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto mb-2"></div>
                <p class="text-gray-600 dark:text-gray-400">Carregando imagem...</p>
              </div>
            </div>

            <!-- Canvas -->
            <canvas
              *ngIf="imageLoaded"
              #canvas
              class="cursor-move"
              (mousedown)="onMouseDown($event)"
              (mousemove)="onMouseMove($event)"
              (mouseup)="onMouseUp()"
              (mouseleave)="onMouseUp()"
              (wheel)="onWheel($event)"
            ></canvas>
            
            <!-- Hidden image for reference -->
            <img
              #imagePreview
              [src]="imagePreview"
              style="display: none;"
            />
          </div>
        </div>

        <!-- Zoom Controls -->
        <div class="flex justify-center items-center space-x-4 mb-4">
          <button
            (click)="zoomOut()"
            class="px-3 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-600"
            title="Diminuir zoom"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path>
            </svg>
          </button>
          
          <span class="text-sm text-gray-600 dark:text-gray-400 min-w-[60px] text-center">
            {{ (cropData.scale * 100).toFixed(0) }}%
          </span>
          
          <button
            (click)="zoomIn()"
            class="px-3 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-600"
            title="Aumentar zoom"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
          </button>
        </div>

        <!-- Controls -->
        <div class="flex justify-between items-center">
          <button
            (click)="resetCrop()"
            class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-600"
          >
            Resetar
          </button>

          <div class="flex space-x-3">
            <button
              (click)="onCancel()"
              class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-600"
            >
              Cancelar
            </button>
            <button
              (click)="applyCrop()"
              class="px-4 py-2 text-sm font-medium text-white bg-blue-600 border border-transparent rounded-lg hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
            >
              Aplicar Corte
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
