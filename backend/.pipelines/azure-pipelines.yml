# Pipeline de Deploy para o Backend (API) via FTP
# Este arquivo deve ser commitado no repositório para ser detectado pelo Azure DevOps

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - backend/*

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: prod_variables # Vincula o grupo de variáveis criado na Library
- name: buildConfiguration
  value: 'Release'
- name: dotNetFramework
  value: 'net6.0'
  # Variáveis de FTP devem ser configuradas na interface do Azure DevOps (Library/Variables)
  # para segurança, mas deixo os valores padrão aqui comentados como referência:
  # ftpUrl: 'ftp://catalogo.sanyz.com.br' 
  # ftpRootFolder: '/catalogo.sanyz.com.br/wwwroot'

steps:
- task: UseDotNet@2
  displayName: 'Instalar .NET SDK 6.0'
  inputs:
    packageType: 'sdk'
    version: '6.x'

- task: DotNetCoreCLI@2
  displayName: 'Restaurar Dependências'
  inputs:
    command: 'restore'
    projects: '**/MeuCatalogo.API.csproj'

- task: DotNetCoreCLI@2
  displayName: 'Build do Projeto'
  inputs:
    command: 'build'
    projects: '**/MeuCatalogo.API.csproj'
    arguments: '--configuration $(buildConfiguration) --no-restore'

- task: DotNetCoreCLI@2
  displayName: 'Publicar Projeto'
  inputs:
    command: 'publish'
    publishWebProjects: false
    projects: '**/MeuCatalogo.API.csproj'
    # --output define onde os arquivos finais ficarão antes do upload
    arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory) --no-build'
    zipAfterPublish: false
    modifyOutputPath: false

- task: UsePythonVersion@0
  displayName: 'Instalar Python 3.x para Script de Deploy'
  inputs:
    versionSpec: '3.x'
    addToPath: true

- task: PythonScript@0
  displayName: 'Executar Deploy Seguro via FTP (com app_offline)'
  inputs:
    scriptSource: 'filePath'
    scriptPath: 'backend/.pipelines/deploy-iis.py'
  env:
    FTP_URL: $(ftpUrl)
    FTP_USER: $(ftpUser)
    FTP_PASS: $(ftpPassword)
    LOCAL_DIR: $(Build.ArtifactStagingDirectory)
    REMOTE_DIR: '/wwwroot' # Caminho padrão IIS