# Pipeline de Deploy para o Backend (API) via FTP
# Este arquivo deve ser commitado no repositório para ser detectado pelo Azure DevOps

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - backend/*

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: prod_variables # Vincula o grupo de variáveis criado na Library
- name: buildConfiguration
  value: 'Release'
- name: dotNetFramework
  value: 'net6.0'
  # Variáveis de FTP devem ser configuradas na interface do Azure DevOps (Library/Variables)
  # para segurança, mas deixo os valores padrão aqui comentados como referência:
  # ftpUrl: 'ftp://catalogo.sanyz.com.br' 
  # ftpRootFolder: '/catalogo.sanyz.com.br/wwwroot'

steps:
- task: UseDotNet@2
  displayName: 'Instalar .NET SDK 6.0'
  inputs:
    packageType: 'sdk'
    version: '6.x'

- task: DotNetCoreCLI@2
  displayName: 'Restaurar Dependências'
  inputs:
    command: 'restore'
    projects: '**/MeuCatalogo.API.csproj'

- task: DotNetCoreCLI@2
  displayName: 'Build do Projeto'
  inputs:
    command: 'build'
    projects: '**/MeuCatalogo.API.csproj'
    arguments: '--configuration $(buildConfiguration) --no-restore'

- task: DotNetCoreCLI@2
  displayName: 'Publicar Projeto'
  inputs:
    command: 'publish'
    projects: '**/MeuCatalogo.API.csproj'
    arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'
    zipAfterPublish: true

- task: AzureWebApp@1
  displayName: 'Deploy to Azure App Service'
  inputs:
    azureSubscription: 'GTech(b42a60f5-3c02-4a26-851c-36d2273fb56a)'
    appType: 'webAppLinux'
    appName: 'catalogo-api-epc5gndpfggde0eg'
    deployToSlotOrASE: true
    resourceGroupName: 'Catalogo'
    slotName: 'production'
    package: '$(Build.ArtifactStagingDirectory)/**/*.zip'

