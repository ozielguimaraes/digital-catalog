# Pipeline de Deploy para o Backend (API) via FTP
# Este arquivo deve ser commitado no repositório para ser detectado pelo Azure DevOps

trigger:
- main # Executa automaticamente quando houver commit na branch main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  dotNetFramework: 'net6.0'
  # Variáveis de FTP devem ser configuradas na interface do Azure DevOps (Library/Variables)
  # para segurança, mas deixo os valores padrão aqui comentados como referência:
  # ftpUrl: 'ftp://catalogo.sanyz.com.br' 
  # ftpRootFolder: '/catalogo.sanyz.com.br/wwwroot'

steps:
- task: UseDotNet@2
  displayName: 'Instalar .NET SDK 6.0'
  inputs:
    packageType: 'sdk'
    version: '6.x'

- task: DotNetCoreCLI@2
  displayName: 'Restaurar Dependências'
  inputs:
    command: 'restore'
    projects: '**/MeuCatalogo.API.csproj'

- task: DotNetCoreCLI@2
  displayName: 'Build do Projeto'
  inputs:
    command: 'build'
    projects: '**/MeuCatalogo.API.csproj'
    arguments: '--configuration $(buildConfiguration) --no-restore'

- task: DotNetCoreCLI@2
  displayName: 'Publicar Projeto'
  inputs:
    command: 'publish'
    publishWebProjects: false
    projects: '**/MeuCatalogo.API.csproj'
    # --output define onde os arquivos finais ficarão antes do upload
    arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory) --no-build'
    zipAfterPublish: false
    modifyOutputPath: false

- task: FtpUpload@2
  displayName: 'Upload dos Arquivos via FTP'
  inputs:
    credentialsOption: 'inputs'
    serverUrl: '$(ftpUrl)'     # Configurar no Azure DevOps: ftp://catalogo.sanyz.com.br
    username: '$(ftpUser)'     # Configurar no Azure DevOps: 9295_sanyz
    password: '$(ftpPassword)' # Configurar no Azure DevOps: b3ndgzwa##suroaylqjvmxe
    rootDirectory: '$(Build.ArtifactStagingDirectory)'
    filePatterns: '**'
    remoteDirectory: '$(ftpRootFolder)' # Configurar no Azure DevOps: /catalogo.sanyz.com.br/wwwroot
    clean: false               # Define se deve limpar o diretório remoto antes (Cuidado!)
    cleanContents: false
    preservePaths: true
    trustSSL: true             # Necessário se o servidor usar FTPS ou certificado auto-assinados