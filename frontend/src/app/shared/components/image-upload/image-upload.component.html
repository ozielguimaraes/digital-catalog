<div class="space-y-4">
  <!-- Messages -->
  <div *ngIf="errorMessage" class="p-4 text-red-700 bg-red-100 border border-red-300 rounded-lg dark:bg-red-900/20 dark:text-red-400 dark:border-red-800">
    <div class="flex">
      <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
      </svg>
      {{ errorMessage }}
    </div>
  </div>

  <div *ngIf="successMessage" class="p-4 text-green-700 bg-green-100 border border-green-300 rounded-lg dark:bg-green-900/20 dark:text-green-400 dark:border-green-800">
    <div class="flex">
      <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
      </svg>
      {{ successMessage }}
    </div>
  </div>

  <!-- Upload Area -->
  <div
    class="transition border border-gray-300 border-dashed cursor-pointer dark:hover:border-brand-500 dark:border-gray-700 rounded-xl hover:border-brand-500"
    [ngClass]="isDragActive
      ? 'border-brand-500 bg-gray-100 dark:bg-gray-800'
      : 'border-gray-300 bg-gray-50 dark:border-gray-700 dark:bg-gray-900'"
    [class.opacity-50]="isProcessing"
    [class.cursor-not-allowed]="isProcessing"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
    (click)="!isProcessing && triggerFileInput()"
  >
    <!-- Hidden Input -->
    <input
      #fileInput
      type="file"
      [accept]="acceptedTypesString"
      multiple
      style="display: none"
      (change)="onFileSelected($event)"
    />

    <div class="p-6 text-center">
      <!-- Loading State -->
      <div *ngIf="isProcessing" class="mb-4 flex justify-center">
        <div class="flex h-16 w-16 items-center justify-center rounded-full bg-blue-100 text-blue-600 dark:bg-blue-900 dark:text-blue-400">
          <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
        </div>
      </div>

      <!-- Normal State -->
      <div *ngIf="!isProcessing">
        <!-- Icon Container -->
        <div class="mb-4 flex justify-center">
          <div class="flex h-16 w-16 items-center justify-center rounded-full bg-gray-200 text-gray-700 dark:bg-gray-800 dark:text-gray-400">
            <svg
              class="fill-current"
              width="32"
              height="32"
              viewBox="0 0 29 28"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                fill-rule="evenodd"
                clip-rule="evenodd"
                d="M14.5019 3.91699C14.2852 3.91699 14.0899 4.00891 13.953 4.15589L8.57363 9.53186C8.28065 9.82466 8.2805 10.2995 8.5733 10.5925C8.8661 10.8855 9.34097 10.8857 9.63396 10.5929L13.7519 6.47752V18.667C13.7519 19.0812 14.0877 19.417 14.5019 19.417C14.9161 19.417 15.2519 19.0812 15.2519 18.667V6.48234L19.3653 10.5929C19.6583 10.8857 20.1332 10.8855 20.426 10.5925C20.7188 10.2995 20.7186 9.82463 20.4256 9.53184L15.0838 4.19378C14.9463 4.02488 14.7367 3.91699 14.5019 3.91699ZM5.91626 18.667C5.91626 18.2528 5.58047 17.917 5.16626 17.917C4.75205 17.917 4.41626 18.2528 4.41626 18.667V21.8337C4.41626 23.0763 5.42362 24.0837 6.66626 24.0837H22.3339C23.5766 24.0837 24.5839 23.0763 24.5839 21.8337V18.667C24.5839 18.2528 24.2482 17.917 23.8339 17.917C23.4197 17.917 23.0839 18.2528 23.0839 18.667V21.8337C23.0839 22.2479 22.7482 22.5837 22.3339 22.5837H6.66626C6.25205 22.5837 5.91626 22.2479 5.91626 21.8337V18.667Z"
              />
            </svg>
          </div>
        </div>
      </div>

      <!-- Text Content -->
      <h4 class="mb-2 font-semibold text-gray-800 text-lg dark:text-white/90">
        <span *ngIf="isProcessing">Processando imagens...</span>
        <span *ngIf="!isProcessing">{{ isDragActive ? 'Solte as imagens aqui' : 'Arraste e solte imagens aqui' }}</span>
      </h4>

      <p class="text-sm text-gray-600 dark:text-gray-400 mb-4">
        PNG, JPG, WebP, SVG, AVIF até {{ maxFiles }} arquivos (máx. 10MB cada)
      </p>

      <span *ngIf="!isProcessing" class="font-medium underline text-sm text-brand-500">
        Ou clique para selecionar
      </span>
    </div>
  </div>

  <!-- Uploaded Images Grid -->
  <div *ngIf="uploadedImages.length > 0" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
    <div
      *ngFor="let image of uploadedImages; let i = index"
      class="relative group bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 overflow-hidden"
    >
      <!-- Image Preview -->
      <img
        [src]="image.preview"
        [alt]="image.file.name"
        class="w-full h-32 object-cover"
      />

      <!-- Action buttons - always visible but with hover effect -->
      <div class="absolute top-2 right-2 flex space-x-1">
        <button
          (click)="editImage(i)"
          class="p-1.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors opacity-0 group-hover:opacity-100"
          title="Editar imagem"
        >
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
          </svg>
        </button>
        <button
          (click)="removeImage(i)"
          class="p-1.5 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors opacity-0 group-hover:opacity-100"
          title="Remover imagem"
        >
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
          </svg>
        </button>
      </div>

      <!-- Edited indicator -->
      <div *ngIf="image.isEdited" class="absolute top-2 left-2">
        <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200">
          <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
          </svg>
          Editada
        </span>
      </div>

      <!-- File name -->
      <div class="absolute bottom-0 left-0 right-0 bg-black bg-opacity-75 text-white text-xs p-2 truncate">
        {{ image.file.name }}
      </div>
    </div>
  </div>

  <!-- Add more button -->
  <div *ngIf="canAddMore && uploadedImages.length > 0" class="flex justify-center">
    <button
      (click)="triggerFileInput()"
      class="inline-flex items-center px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-600"
    >
      <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
      </svg>
      Adicionar mais imagens
    </button>
  </div>
</div>

<!-- Image Editor Modal -->
<app-image-editor
  *ngIf="showImageEditor"
  [imageFile]="editingImage"
  (imageEdited)="onImageEdited($event)"
  (cancel)="onEditCancel()"
></app-image-editor>
