<div>
  <app-page-breadcrumb pageTitle="Produtos" />
  <div class="space-y-6">
    <!-- Page Header -->
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Produtos</h1>
        <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
          Gerencie os produtos do seu catálogo
        </p>
      </div>
      <button
        (click)="onAddProduct()"
        [disabled]="!selectedCatalogId"
        class="inline-flex items-center px-4 py-2 text-sm font-medium text-white bg-blue-600 border border-transparent rounded-lg hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
        </svg>
        Novo Produto
      </button>
    </div>

    <!-- Catalog Selection -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4">
      <label for="catalogSelect" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
        Selecione o Catálogo
      </label>
      <select
        id="catalogSelect"
        [(ngModel)]="selectedCatalogId"
        (change)="onCatalogChange()"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
      >
        <option value="">Selecione um catálogo</option>
        <option *ngFor="let catalog of catalogs" [value]="catalog.id">
          {{ catalog.nome }} ({{ catalog.nomeCurto }})
        </option>
      </select>
    </div>

  <!-- Messages -->
  <div *ngIf="error" class="p-4 text-red-700 bg-red-100 border border-red-300 rounded-lg dark:bg-red-900/20 dark:text-red-400 dark:border-red-800">
    <div class="flex">
      <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
      </svg>
      {{ error }}
    </div>
  </div>

  <div *ngIf="success" class="p-4 text-green-700 bg-green-100 border border-green-300 rounded-lg dark:bg-green-900/20 dark:text-green-400 dark:border-green-800">
    <div class="flex">
      <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
      </svg>
      {{ success }}
    </div>
  </div>

  <!-- Loading Overlay -->
  <div *ngIf="loading" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white dark:bg-gray-800 rounded-lg p-6 flex items-center space-x-3">
      <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600"></div>
      <span class="text-gray-700 dark:text-gray-300">Processando...</span>
    </div>
  </div>

  <!-- Product Form Modal -->
  <div *ngIf="showForm" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
      <div class="p-6">
        <app-product-form
          [product]="editingProduct"
          [catalogoId]="selectedCatalogId"
          [isEdit]="isEdit"
          (save)="onSaveProduct($event)"
          (cancel)="onCancelForm()"
        ></app-product-form>
      </div>
    </div>
  </div>

    <!-- Product List -->
    <div *ngIf="!showForm && selectedCatalogId">
      <app-product-list
        [catalogoId]="selectedCatalogId"
        (editProduct)="onEditProduct($event)"
        (deleteProduct)="onDeleteProduct($event)"
        (updateStock)="onUpdateStock($event)"
      ></app-product-list>
    </div>

    <!-- No Catalog Selected Message -->
    <div *ngIf="!showForm && !selectedCatalogId && catalogs.length > 0" class="text-center py-12">
      <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
      </svg>
      <h3 class="mt-2 text-sm font-medium text-gray-900 dark:text-white">Selecione um catálogo</h3>
      <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Escolha um catálogo para visualizar os produtos.</p>
    </div>

    <!-- No Catalogs Message -->
    <div *ngIf="!showForm && catalogs.length === 0 && !loading" class="text-center py-12">
      <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
      </svg>
      <h3 class="mt-2 text-sm font-medium text-gray-900 dark:text-white">Nenhum catálogo encontrado</h3>
      <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Crie um catálogo primeiro para gerenciar produtos.</p>
    </div>
  </div>
</div>
